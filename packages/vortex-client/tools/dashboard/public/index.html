<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <title>Vortex - installation des assets</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <header>
        <h1>Installation des assets Habbo</h1>
        <p class="subtitle">Suis les etapes dans l'ordre - chacune est necessaire pour que le client ait ses assets.</p>
    </header>

    <ol id="stepper"></ol>

    <main id="step-body"></main>

    <template id="browser-template">
        <div class="browser">
            <div class="browser-path"></div>
            <div class="browser-error"></div>
            <div class="browser-list"></div>
            <div class="browser-actions">
                <button class="browser-pick">Choisir ce dossier</button>
            </div>
        </div>
    </template>

    <script src="/app.js" defer></script>
</body>
</html>
