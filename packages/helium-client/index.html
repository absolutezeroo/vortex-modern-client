<div id="helium-ui"></div>

<script type="module">
    const existingConfig = window.HeliumConfig ?? {};
    const existingConnection = existingConfig.connection ?? {};

    window.HeliumConfig = {
        ...existingConfig,
        connection: {
            host: '127.0.0.1',
            ports: [30001],
            ...existingConnection,
        }
    };
</script>
